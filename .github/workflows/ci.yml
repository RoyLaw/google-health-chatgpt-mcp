name: CI

on:
  push:
  pull_request:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: docker build -t google-health-chatgpt-mcp:test .
      - run: docker run --rm google-health-chatgpt-mcp:test test -f /app/dist/scripts/init-db.js
      - run: docker run --rm google-health-chatgpt-mcp:test test -f /app/sql/schema.sql
